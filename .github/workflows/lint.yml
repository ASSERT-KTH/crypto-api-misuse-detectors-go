name: lint

on:
  push:
    branches:
      - main
      - extend-analysis
  pull_request:
    branches:
      - main

jobs:  
  golint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Golangci-lint
        uses: golangci/golangci-lint-action@v6.5.0
        with:
          working-directory: "."
